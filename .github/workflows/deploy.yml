name: Deploy to Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - deployment_files/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Apply Kubernetes Manifest
    runs-on: ubuntu-latest
    env:
      K8S_NAMESPACE: default
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret is not set"
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Validate cluster connection
        run: kubectl cluster-info

      - name: Create or update application secrets
        shell: bash
        env:
          ASERVICE_BUS_CONNECTION_STRING: ${{ secrets.ASERVICE_BUS_CONNECTION_STRING }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          BLOB_CONNECTION_STRING: ${{ secrets.BLOB_CONNECTION_STRING }}
        run: |
          kubectl get namespace "$K8S_NAMESPACE" >/dev/null

          if [ -z "$ASERVICE_BUS_CONNECTION_STRING" ] || [ -z "$MONGO_URI" ] || [ -z "$BLOB_CONNECTION_STRING" ]; then
            echo "Required GitHub secrets are missing."
            echo "Expected: ASERVICE_BUS_CONNECTION_STRING, MONGO_URI, BLOB_CONNECTION_STRING"
            exit 1
          fi

          if [[ "$ASERVICE_BUS_CONNECTION_STRING" != Endpoint=sb://* ]] || [[ "$ASERVICE_BUS_CONNECTION_STRING" != *"SharedAccessKeyName="* ]] || [[ "$ASERVICE_BUS_CONNECTION_STRING" != *"SharedAccessKey="* ]]; then
            echo "ASERVICE_BUS_CONNECTION_STRING does not look like a valid Service Bus connection string."
            echo "Expected format starts with: Endpoint=sb://<namespace>.servicebus.windows.net/;..."
            exit 1
          fi

          kubectl create secret generic best-buy-secrets \
            -n "$K8S_NAMESPACE" \
            --from-literal=ASERVICE_BUS_CONNECTION_STRING="$ASERVICE_BUS_CONNECTION_STRING" \
            --from-literal=MONGO_URI="$MONGO_URI" \
            --from-literal=BLOB_CONNECTION_STRING="$BLOB_CONNECTION_STRING" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy application
        run: kubectl apply -n "$K8S_NAMESPACE" -f deployment_files/best-buy.yaml

      - name: Verify rollouts
        run: |
          kubectl rollout status deployment/order-service -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/makeline-service -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/shipping-service -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/product-service -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/store-front -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/store-admin -n "$K8S_NAMESPACE" --timeout=300s

      - name: Dump diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "=== Deployments ==="
          kubectl get deployments -n "$K8S_NAMESPACE" -o wide || true

          echo "=== Pods ==="
          kubectl get pods -n "$K8S_NAMESPACE" -o wide || true

          echo "=== Recent Events ==="
          kubectl get events -n "$K8S_NAMESPACE" --sort-by=.metadata.creationTimestamp | tail -n 100 || true

          echo "=== Makeline Deployment Describe ==="
          kubectl describe deployment makeline-service -n "$K8S_NAMESPACE" || true

          echo "=== Makeline Pods Describe and Logs ==="
          for p in $(kubectl get pod -n "$K8S_NAMESPACE" -l app=makeline-service -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- Describe $p ---"
            kubectl describe pod "$p" -n "$K8S_NAMESPACE" || true
            echo "--- Logs $p ---"
            kubectl logs "$p" -n "$K8S_NAMESPACE" --tail=200 || true
            echo "--- Previous Logs $p ---"
            kubectl logs "$p" -n "$K8S_NAMESPACE" --previous --tail=200 || true
          done
